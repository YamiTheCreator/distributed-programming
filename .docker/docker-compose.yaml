services:
  redis:
    image: redis:alpine
    container_name: valuator-redis
    ports:
      - "6379:6379"
    networks:
      - valuator-network

  valuator-1:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: valuator-app-1
    environment:
      - ASPNETCORE_URLS=http://+:5001
      - ConnectionStrings__Redis=redis:6379
    ports:
      - "5001:5001"
    depends_on:
      - redis
    networks:
      - valuator-network

  valuator-2:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: valuator-app-2
    environment:
      - ASPNETCORE_URLS=http://+:5002
      - ConnectionStrings__Redis=redis:6379
    ports:
      - "5002:5002"
    depends_on:
      - redis
    networks:
      - valuator-network

  nginx:
    image: nginx:alpine
    container_name: valuator-nginx
    ports:
      - "8080:8080"
    volumes:
      - ../nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      valuator-1:
        condition: service_started
      valuator-2:
        condition: service_started
    restart: on-failure
    networks:
      - valuator-network

networks:
  valuator-network:
    driver: bridge