name: valuator

services:
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - valuator-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - valuator-network

  valuator-1:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: valuator-app-1
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5001
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    ports:
      - "5001:5001"
    depends_on:
      - redis
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  valuator-2:
    build:
      context: ..
      dockerfile: .docker/Dockerfile
    container_name: valuator-app-2
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5002
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    ports:
      - "5002:5002"
    depends_on:
      - redis
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  rankcalculator-1:
    build:
      context: ..
      dockerfile: .docker/RankCalculator.Dockerfile
    container_name: rank-calculator-1
    environment:
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      - redis
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  rankcalculator-2:
    build:
      context: ..
      dockerfile: .docker/RankCalculator.Dockerfile
    container_name: rank-calculator-2
    environment:
      - ConnectionStrings__Redis=redis:6379
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      - redis
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  eventslogger-1:
    build:
      context: ..
      dockerfile: .docker/EventsLogger.Dockerfile
    container_name: events-logger-1
    environment:
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  eventslogger-2:
    build:
      context: ..
      dockerfile: .docker/EventsLogger.Dockerfile
    container_name: events-logger-2
    environment:
      - ConnectionStrings__RabbitMQ=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      - rabbitmq
    networks:
      - valuator-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "8080:8080"
    volumes:
      - ../nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - valuator-1
      - valuator-2
    restart: unless-stopped
    networks:
      - valuator-network

networks:
  valuator-network:
    driver: bridge